<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - POS Kitsune</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 10px 20px; border-radius: 8px; }
        button { cursor: pointer; padding: 8px 16px; background: #ff4444; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bienvenido al POS Kitsune</h1>
        <div>
            <span id="displayUsuario" style="font-weight: bold; margin-right: 15px;"></span>
            <button onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <h3>Panel de Control</h3>
        <p>Has ingresado correctamente al sistema.</p>
        </div>

    <script>
        // 1. VERIFICACIÓN DE SESIÓN (OBLIGATORIO)
        // Buscamos 'usuario' porque así lo guardamos en el login.html corregido
        const usuarioLogueado = localStorage.getItem("usuario");

        if (!usuarioLogueado) {
            // Si no hay nada guardado, lo mandamos al login inmediatamente
            alert("No hay sesión activa. Inicia sesión primero.");
            window.location.href = "login.html";
        } else {
            // Si existe, lo mostramos en pantalla
            document.getElementById('displayUsuario').innerText = "Usuario: " + usuarioLogueado;
            console.log("Acceso concedido a: " + usuarioLogueado);
        }

        // 2. FUNCIÓN PARA SALIR
        function cerrarSesion() {
            // Borramos el dato para que el guardia (el código de arriba) lo detenga la próxima vez
            localStorage.removeItem("usuario");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
