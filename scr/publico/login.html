<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - POS Kitsune</title>
</head>
<body>
  <h2>Iniciar Sesión</h2>
  <form id="loginForm">
    <label>Usuario: <input type="text" id="usuario" required></label><br>
    <label>Contraseña: <input type="password" id="password" required></label><br>
    <button type="submit">Entrar</button>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;

      // DETECCIÓN AUTOMÁTICA DE URL
      const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? "http://localhost:3000" 
        : "https://poskitsune-production.up.railway.app"; 

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario, password })
        });

        const data = await res.json();

        // CORRECCIÓN: Tu servidor envía 'error: false' cuando es correcto
        // Y los datos están en 'data.mensaje' y 'data.usuario'
        if (res.ok && data.error === false) {
          // Guardamos el nombre de usuario ya que no estás usando tokens todavía
          localStorage.setItem("usuario", data.usuario);
          
          alert("¡Bienvenido, " + data.usuario + "!");
          window.location.href = "index.html"; 
        } else {
          // Si el servidor mandó un error, usamos el mensaje que viene de la DB
          alert(data.mensaje || "Login incorrecto");
        }
      } catch (error) {
        console.error("Error de conexión:", error);
        alert("No se pudo conectar con el servidor. Revisa la consola (F12).");
      }
    });
  </script>
</body>
</html>
