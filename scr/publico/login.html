<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - POS Kitsune</title>
</head>
<body>
  <h2>Iniciar Sesión</h2>
  <form id="loginForm">
    <label>Usuario: <input type="text" id="usuario" required></label><br>
    <label>Contraseña: <input type="password" id="password" required></label><br>
    <button type="submit">Entrar</button>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;

      // DETECCIÓN AUTOMÁTICA DE URL
      const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? "http://localhost:3000" 
        : "https://poskitsune-production.up.railway.app"; 

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem("token", data.token);
          window.location.href = "index.html";
        } else {
          alert(data.message || "Login incorrecto");
        }
      } catch (error) {
        console.error("Error de conexión:", error);
        alert("No se pudo conectar con el servidor. Revisa los logs.");
      }
    });
  </script>
</body>
</html>
