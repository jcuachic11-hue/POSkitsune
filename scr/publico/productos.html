<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - POS Kitsune</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        form { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 150px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-add { background: #28a745; color: white; }
        .btn-back { background: #6c757d; color: white; text-decoration: none; display: inline-block; margin-bottom: 20px; padding: 5px 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">← Volver al Menú</a>
        <h2>Gestión de Productos</h2>

        <form id="formProducto">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="number" id="precio" placeholder="Precio" step="0.01" required>
            <input type="number" id="stock" placeholder="Stock" required>
            <button type="submit" class="btn-add">Agregar Producto</button>
        </form>

        <table id="tablaProductos">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? "http://localhost:3000" 
            : "https://poskitsune-production.up.railway.app";

        // 1. VERIFICAR SESIÓN
        if (!localStorage.getItem("usuario")) {
            window.location.href = "login.html";
        }

        // 2. CARGAR PRODUCTOS
        async function cargarProductos() {
            try {
                const res = await fetch(`${API_URL}/productos`);
                const productos = await res.json();
                const tbody = document.querySelector('#tablaProductos tbody');
                tbody.innerHTML = '';
                productos.forEach(p => {
                    tbody.innerHTML += `<tr><td>${p.nombre}</td><td>$${p.precio}</td><td>${p.stock}</td></tr>`;
                });
            } catch (e) { console.error("Error cargando:", e); }
        }

        // 3. GUARDAR PRODUCTO
        document.getElementById('formProducto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                nombre: document.getElementById('nombre').value,
                precio: document.getElementById('precio').value,
                stock: document.getElementById('stock').value
            };

            try {
                const res = await fetch(`${API_URL}/productos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                const r = await res.json();
                if (!r.error) {
                    alert("Guardado!");
                    document.getElementById('formProducto').reset();
                    cargarProductos();
                } else {
                    alert("Error: " + r.mensaje);
                }
            } catch (e) { alert("Error de red"); }
        });

        cargarProductos();
    </script>
</body>
</html>
