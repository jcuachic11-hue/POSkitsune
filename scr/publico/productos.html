<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - POS Kitsune</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f0f2f5; }
        .card { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { display: grid; grid-template-columns: 1fr 1fr 1fr 100px auto; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; background: #28a745; color: white; font-weight: bold; }
        button:hover { background: #218838; }
        .btn-back { color: #666; text-decoration: none; font-size: 14px; display: block; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="btn-back">← Volver al Menú Principal</a>
    <h2>📦 Gestión de Inventario</h2>

    <form id="formProducto" class="form-group">
        <input type="text" id="nombre" placeholder="Nombre del Producto" required>
        <input type="text" id="descripcion" placeholder="Descripción corta">
        <input type="number" id="precio" placeholder="Precio" step="0.01" required>
        <input type="number" id="stock" placeholder="Stock" required>
        <button type="submit">Guardar</button>
    </form>

    <table id="tablaProductos">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    const API_URL = window.location.hostname === 'localhost' 
        ? "http://localhost:3000" 
        : "https://poskitsune-production.up.railway.app";

    // Verificación de seguridad rápida
    if (!localStorage.getItem("usuario")) { window.location.href = "login.html"; }

    async function cargarProductos() {
        try {
            const res = await fetch(`${API_URL}/productos`);
            const productos = await res.json();
            const tbody = document.querySelector('#tablaProductos tbody');
            tbody.innerHTML = '';
            productos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${p.nombre}</strong></td>
                        <td>${p.descripcion || '<span style="color:#ccc">Sin descripción</span>'}</td>
                        <td>$${p.precio}</td>
                        <td>${p.stock} unidades</td>
                    </tr>`;
            });
        } catch (e) { console.error("Error al cargar:", e); }
    }

    document.getElementById('formProducto').addEventListener('submit', async (e) => {
        e.preventDefault();
        const datos = {
            nombre: document.getElementById('nombre').value,
            descripcion: document.getElementById('descripcion').value,
            precio: document.getElementById('precio').value,
            stock: document.getElementById('stock').value
        };

        try {
            const res = await fetch(`${API_URL}/productos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            const r = await res.json();
            if (!r.error) {
                document.getElementById('formProducto').reset();
                cargarProductos();
            } else { alert("Error: " + r.mensaje); }
        } catch (e) { alert("Error de conexión"); }
    });

    // Carga inicial
    cargarProductos();
</script>

</body>
</html>
